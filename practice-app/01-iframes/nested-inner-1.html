<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inner Frame 1</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 12px;
      background: #ecfdf5;
      color: #065f46;
      text-align: center;
    }
    h4 { margin: 4px 0; }
    button {
      padding: 6px 14px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #inner-1-message { font-weight: bold; margin-top: 8px; }
  </style>
</head>
<body>
  <h4>Inner Frame 1</h4>
  <button type="button" id="inner-1-btn">Click Me</button>
  <p id="inner-1-message"></p>

  <script>
    document.getElementById("inner-1-btn").addEventListener("click", function () {
      document.getElementById("inner-1-message").textContent = "Inner frame 1 button clicked!";
    });
  </script>
</body>
</html>
