<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details — New Tab</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0; padding: 24px;
        background: #f0f4f8; color: #1f2933;
      }
      .container { width: 90%; max-width: 820px; margin: 0 auto; }
      .back-link { display: inline-block; margin-bottom: 16px; color: #4a90d9; font-size: 13px; text-decoration: none; }
      .back-link:hover { text-decoration: underline; }
      .product-card {
        background: #fff; border: 1px solid #d9e2ec; border-radius: 10px;
        padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
        display: grid; grid-template-columns: 180px 1fr; gap: 24px;
      }
      .product-image {
        width: 180px; height: 180px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 64px; background: #e8f0f7;
      }
      .product-info h1 { margin-top: 0; font-size: 22px; }
      .product-category {
        display: inline-block; font-size: 11px; padding: 2px 8px;
        border-radius: 20px; background: #dbeafe; color: #1d4ed8; margin-bottom: 10px;
      }
      .product-price {
        font-size: 28px; font-weight: bold; color: #166534; margin: 10px 0;
      }
      .product-rating { font-size: 14px; color: #627d98; margin-bottom: 12px; }
      .product-description { font-size: 14px; color: #486581; line-height: 1.6; }
      .section {
        background: #fff; border: 1px solid #d9e2ec; border-radius: 8px;
        padding: 18px 20px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      }
      .section h2 { margin-top: 0; font-size: 16px; color: #334e68; }
      button {
        padding: 10px 22px; background: #4a90d9; color: #fff;
        border: none; border-radius: 5px; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #357ac0; }
      button.secondary { background: #627d98; }
      button.secondary:hover { background: #486581; }
      button.success { background: #166534; }
      button.success:hover { background: #14532d; }
      .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
      .output-box {
        margin-top: 10px; background: #f5f7fa; border: 1px solid #d9e2ec;
        border-radius: 5px; padding: 10px 14px; font-size: 13px; min-height: 36px; color: #334e68;
      }
      .qty-control {
        display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      }
      .qty-control button {
        width: 34px; height: 34px; padding: 0; font-size: 18px; border-radius: 5px;
      }
      .qty-control input {
        width: 50px; text-align: center; padding: 6px; border: 1px solid #bcccdc;
        border-radius: 5px; font-size: 14px;
      }
      code { background: #eef2f7; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
      .hint { font-size: 12px; color: #829ab1; margin-bottom: 10px; font-style: italic; }
      .breadcrumb { font-size: 12px; color: #829ab1; margin-bottom: 12px; }
      .breadcrumb a { color: #4a90d9; text-decoration: none; }
      .breadcrumb a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">

      <!-- Breadcrumb — locatable by role=navigation, getByText, or axes -->
      <nav aria-label="Breadcrumb" class="breadcrumb">
        <a href="/tabs-windows/index.html">Tabs &amp; Windows</a> › Product Details
      </nav>

      <a href="javascript:window.close()" id="close-tab-link" data-testid="close-tab-link" class="back-link">
        ← Close This Tab
      </a>

      <!-- ================================================================
           PRODUCT CARD — dynamic content from URL param
           id, data-testid, data-product-id, aria-label on key elements
      ================================================================ -->
      <div
        class="product-card"
        id="product-card"
        data-testid="product-card"
        role="main"
        aria-label="Product details"
      >
        <div class="product-image" id="product-emoji" data-testid="product-image" role="img" aria-label="Product image">
          📦
        </div>
        <div class="product-info">
          <!-- locate by id, testid, heading role, or text -->
          <span class="product-category" id="product-category" data-testid="product-category"></span>
          <h1 id="product-name" data-testid="product-name"></h1>
          <div class="product-rating" id="product-rating" data-testid="product-rating"></div>
          <div class="product-price" id="product-price" data-testid="product-price"></div>
          <p class="product-description" id="product-description" data-testid="product-description"></p>

          <!-- Qty — input with name + id + aria -->
          <div class="qty-control">
            <button id="qty-decrease" data-testid="qty-decrease" aria-label="Decrease quantity" onclick="changeQty(-1)">−</button>
            <input
              type="number"
              id="qty-input"
              data-testid="qty-input"
              name="quantity"
              value="1"
              min="1"
              max="99"
              aria-label="Quantity"
              onchange="updateTotal()"
            />
            <button id="qty-increase" data-testid="qty-increase" aria-label="Increase quantity" onclick="changeQty(1)">+</button>
          </div>

          <div class="btn-row">
            <button id="btn-add-to-cart" data-testid="add-to-cart-btn" class="success" onclick="addToCart()">
              Add to Cart
            </button>
            <button id="btn-wishlist" data-testid="wishlist-btn" class="secondary" onclick="addToWishlist()">
              ♡ Wishlist
            </button>
          </div>

          <div class="output-box" id="cart-status" data-testid="cart-status" role="status" aria-live="polite">
            No action taken yet.
          </div>
        </div>
      </div>

      <!-- ================================================================
           REVIEWS SECTION — locator practice: table, list, nth
      ================================================================ -->
      <section class="section">
        <h2>Customer Reviews</h2>
        <p class="hint">Practice: get review by index, filter by star rating, assert count.</p>

        <table id="reviews-table" data-testid="reviews-table" aria-label="Customer reviews">
          <thead>
            <tr>
              <th>Reviewer</th>
              <th>Rating</th>
              <th>Comment</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="reviews-body" data-testid="reviews-body"></tbody>
        </table>
      </section>

      <!-- ================================================================
           PAGE META — useful for assertions in tests
      ================================================================ -->
      <section class="section">
        <h2>Page Meta (for Test Assertions)</h2>
        <div class="output-box" id="page-meta" data-testid="page-meta"></div>
      </section>

    </div>

    <script>
      const PRODUCTS = {
        '1': {
          name: 'Wireless Headphones Pro X1',
          category: 'Electronics',
          price: 149.99,
          rating: '★★★★☆ (4.2 / 5 · 128 reviews)',
          emoji: '🎧',
          description: 'Premium noise-cancelling over-ear headphones with 40-hour battery life, multipoint Bluetooth 5.3 connectivity, and foldable design. Great for office and travel.',
          reviews: [
            { reviewer: 'Alice M.',   rating: '★★★★★', comment: 'Exceptional sound quality, really impressed!', date: '2025-11-03' },
            { reviewer: 'Bob T.',     rating: '★★★★☆', comment: 'Great value. ANC could be a bit stronger.',     date: '2025-10-28' },
            { reviewer: 'Carol L.',   rating: '★★★☆☆', comment: 'Comfortable but pairing is sometimes slow.',   date: '2025-10-15' },
          ],
        },
        '2': {
          name: 'Ergonomic Office Chair Z7',
          category: 'Furniture',
          price: 399.00,
          rating: '★★★★★ (4.8 / 5 · 87 reviews)',
          emoji: '🪑',
          description: 'Fully adjustable lumbar support, 4D armrests, breathable mesh back, and tilt tension control. BIFMA certified. Ships fully assembled.',
          reviews: [
            { reviewer: 'David K.', rating: '★★★★★', comment: 'Back pain gone after first week. Worth every penny.', date: '2025-12-01' },
            { reviewer: 'Emma R.', rating: '★★★★☆', comment: 'Very comfortable, assembly instructions are vague.',  date: '2025-11-22' },
          ],
        },
        '3': {
          name: 'Python Test Automation Handbook',
          category: 'Books',
          price: 49.95,
          rating: '★★★★☆ (4.5 / 5 · 213 reviews)',
          emoji: '📚',
          description: 'Covers Selenium, Playwright, pytest, CI/CD pipelines, and reporting with Allure. From beginner to senior automation engineer. 480 pages, updated for 2025.',
          reviews: [
            { reviewer: 'Frank S.',  rating: '★★★★★', comment: 'Best automation book I have read.',           date: '2025-09-30' },
            { reviewer: 'Grace W.',  rating: '★★★☆☆', comment: 'Good theory, examples could be more real-world.', date: '2025-09-12' },
            { reviewer: 'Henry P.',  rating: '★★★★★', comment: 'Playwright chapters are excellent.',          date: '2025-08-25' },
          ],
        },
      };

      /* resolve product from URL param, default to 1 */
      const params    = new URLSearchParams(location.search);
      const productId = params.get('product') || '1';
      const product   = PRODUCTS[productId] || PRODUCTS['1'];

      /* inject product data */
      document.title = `${product.name} — Product Details`;
      document.getElementById('product-emoji').textContent     = product.emoji;
      document.getElementById('product-emoji').setAttribute('aria-label', `${product.name} image`);
      document.getElementById('product-category').textContent  = product.category;
      document.getElementById('product-name').textContent      = product.name;
      document.getElementById('product-rating').textContent    = product.rating;
      document.getElementById('product-price').textContent     = `$${product.price.toFixed(2)}`;
      document.getElementById('product-description').textContent = product.description;

      /* product card gets data-product-id for dynamic locator */
      document.getElementById('product-card').setAttribute('data-product-id', productId);

      /* reviews table */
      const tbody = document.getElementById('reviews-body');
      product.reviews.forEach((r, i) => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-testid', `review-row-${i}`);
        tr.setAttribute('data-review-index', i);
        tr.innerHTML = `
          <td data-testid="review-reviewer">${r.reviewer}</td>
          <td data-testid="review-rating">${r.rating}</td>
          <td data-testid="review-comment">${r.comment}</td>
          <td data-testid="review-date">${r.date}</td>
        `;
        tbody.appendChild(tr);
      });

      /* page meta for assertions */
      document.getElementById('page-meta').textContent = [
        `Page title: ${document.title}`,
        `Product ID: ${productId}`,
        `Product name: ${product.name}`,
        `Category: ${product.category}`,
        `Price: $${product.price.toFixed(2)}`,
        `Review count: ${product.reviews.length}`,
        `URL: ${location.href}`,
      ].join('\n');

      /* qty control */
      function changeQty(delta) {
        const input = document.getElementById('qty-input');
        const newVal = Math.max(1, Math.min(99, parseInt(input.value, 10) + delta));
        input.value = newVal;
        updateTotal();
      }

      function updateTotal() {
        const qty = parseInt(document.getElementById('qty-input').value, 10) || 1;
        const total = (product.price * qty).toFixed(2);
        document.getElementById('cart-status').textContent = `Qty: ${qty} · Total: $${total}`;
      }

      /* cart / wishlist */
      function addToCart() {
        const qty = parseInt(document.getElementById('qty-input').value, 10) || 1;
        const total = (product.price * qty).toFixed(2);
        document.getElementById('cart-status').textContent =
          `✓ Added ${qty}× "${product.name}" to cart. Total: $${total}`;
        document.getElementById('btn-add-to-cart').textContent = 'Added ✓';
        setTimeout(() => {
          document.getElementById('btn-add-to-cart').textContent = 'Add to Cart';
        }, 2000);
      }

      function addToWishlist() {
        document.getElementById('cart-status').textContent =
          `♥ "${product.name}" saved to wishlist.`;
        document.getElementById('btn-wishlist').textContent = '♥ Saved';
      }
    </script>
  </body>
</html>
